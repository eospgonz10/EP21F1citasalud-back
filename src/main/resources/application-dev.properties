# Configuración específica para desarrollo

# Base de datos local (PostgreSQL en Docker)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Configuración de logging para desarrollo
logging.level.com.udea.EP21F1citasalud_back=DEBUG
logging.level.org.springframework.security=DEBUG

# Configuración de Actuator para desarrollo (más endpoints expuestos)
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# Prometheus metrics habilitado
management.metrics.export.prometheus.enabled=true

# Variables de entorno con valores por defecto de error
jwt.secret=${JWT_SECRET:ERROR_FALTA_CONFIGURAR_JWT_SECRET_EN_ENV}
jwt.expiration=${JWT_EXPIRATION:0}

spring.datasource.url=${DB_URL:ERROR_FALTA_CONFIGURAR_DB_URL_EN_ENV}
spring.datasource.username=${DB_USERNAME:ERROR_FALTA_CONFIGURAR_DB_USERNAME_EN_ENV}
spring.datasource.password=${DB_PASSWORD:ERROR_FALTA_CONFIGURAR_DB_PASSWORD_EN_ENV}
