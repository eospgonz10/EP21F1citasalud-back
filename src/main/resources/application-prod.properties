# Configuración específica para producción (Render)

# Base de datos de producción (conservar datos)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Configuración de logging para producción
logging.level.com.udea.EP21F1citasalud_back=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=ERROR

# Configuración de Actuator para producción (endpoints restringidos)
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized

# Prometheus metrics habilitado para monitoreo
management.metrics.export.prometheus.enabled=true

# Configuración de pool de conexiones para producción
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# Variables de entorno (Render las proporcionará automáticamente)
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Render proporciona DATABASE_URL automáticamente para PostgreSQL
# Formato: postgresql://user:password@host:port/database
spring.datasource.url=${DATABASE_URL:${DB_URL}}
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}

# Driver específico para PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver
