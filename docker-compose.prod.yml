# =============================================================================
# DOCKER COMPOSE PARA PRODUCCIÓN LOCAL
# =============================================================================
version: '3.8'

services:
  app:
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_URL=jdbc:postgresql://db:5432/bd_citassalud
      - DB_USERNAME=postgres
      - DB_PASSWORD=root1
      - JWT_SECRET=clave_secreta_super_larga_y_segura_para_jwt_tokens_2024
      - JWT_EXPIRATION=86400000
      - SERVER_PORT=8080
      - CONTEXT_PATH=/api
      - SWAGGER_SERVER_URL=http://localhost:8080/api
      - PROMETHEUS_ENABLED=true
    depends_on:
      - db
      - redis
    networks:
      - app-network

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: bd_citassalud
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root1
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - app-network

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - app-network

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
